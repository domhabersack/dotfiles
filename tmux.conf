################################
# Key bindings                 #
################################

# unbind Ctrl-B (default prefix)
unbind C-b

# remap prefix to Control-A
set -g prefix C-a

# send C-a through to other applications that also use it by pressing it twice
bind C-a send-prefix

# split panes (inherit current pane's directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# reload ~./tmux.conf
bind r source-file ~/.tmux.conf \; display 'Reloaded tmux-configuration.'

# navigate to panes using vim-like navigation keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# cycle through windows using C-h and C-l, again as seen in tmux
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# resize current pane in direction specified by vim-like keys (repeatable)
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# copy and paste using vim key bindings
unbind p
bind Escape copy-mode
bind p paste-buffer
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'


################################
# Mouse mode                   #
################################

# disable mouse mode
set -g mouse off


################################
# Behavior                     #
################################

# change the default delay so keystrokes are more responsive
set -s escape-time 1

# forward focus events so vim autoread and gitgutter update on pane switch
set -g focus-events on

# prevent scrollback
#set -g history-limit 0

# default history
set -g history-limit 2000


################################
# Look and feel                #
################################

# enable 256 colors
set -g default-terminal 'screen-256color'

# hide status bar by default
set -g status off

# style default state of status bar
set -g status-bg white
set -g status-fg black

# frequency of status bar redraws in seconds (default: 15 seconds)
set -g status-interval 60

# align window list to the left
set -g status-justify left

# set left side of status bar
set -g status-left ''
set -g status-left-length 32

# set right side of status bar
set -g status-right '[#[fg=red]#S#[default]] '

# set indices to start at one instead of zero
set -g base-index 1
setw -g pane-base-index 1

# highlight active window
setw -g window-status-current-style bg=red,fg=white

# highlight current selection in choose-tree and copy mode
set -g mode-style "bg=colour15"

# highlight active pane with bold border
set -g pane-active-border-style bg=white,fg=white

# widths in layouts
setw -g main-pane-width 108

# show only window name in choose-tree
bind w choose-tree -w -Z -N -F '#{?#{@tmux_color},#[#{@tmux_color}],}#{?#{@tmux_open_tasks},#[bold],}#{window_name}#{?#{@tmux_open_tasks},#[nobold],}#{?#{@tmux_claude_active}, 🦀,}#{?window_bell_flag, 🔔,}#{?#{@tmux_tasks}, #[fg=black]#{@tmux_tasks},}'
setw -g window-status-current-format '#{?#{@tmux_color},#[#{@tmux_color}],} #I:#{?#{@tmux_open_tasks},#[bold],}#W#{?#{@tmux_open_tasks},#[nobold],}#F#{?#{@tmux_claude_active}, 🦀,}#{?window_bell_flag, 🔔,}#{?#{@tmux_tasks}, #[fg=black]#{@tmux_tasks}#[default],} '
setw -g window-status-format         '#{?#{@tmux_color},#[#{@tmux_color}],} #I:#{?#{@tmux_open_tasks},#[bold],}#W#{?#{@tmux_open_tasks},#[nobold],}#F#{?#{@tmux_claude_active}, 🦀,}#{?window_bell_flag, 🔔,}#{?#{@tmux_tasks}, #[fg=black]#{@tmux_tasks}#[default],} '
setw -g window-status-separator ''

# notify on changes in windows
setw -g monitor-activity on
set -g visual-activity off

# style window that has activity on it
setw -g window-status-activity-style bg=white,fg=red,none

# bell: show 🔔 in window list when a pane rings (e.g. Claude waiting for input)
set -g bell-action any
set -g visual-bell off


################################
# Window sorting               #
################################

set-hook -g after-new-window    'run-shell ~/.dotfiles/bin/tmux-sort-windows'
set-hook -g after-rename-window 'run-shell ~/.dotfiles/bin/tmux-sort-windows'
set-hook -g window-unlinked     'run-shell ~/.dotfiles/bin/tmux-sort-windows'


################################
# Window coloring              #
################################

set-hook -ga after-new-window    'run-shell ~/.dotfiles/bin/tmux-color-windows'
set-hook -ga after-rename-window 'run-shell ~/.dotfiles/bin/tmux-color-windows'
set-hook -ga window-unlinked     'run-shell ~/.dotfiles/bin/tmux-color-windows'

run-shell -b '~/.dotfiles/bin/tmux-color-watch'
run-shell -b '~/.dotfiles/bin/tmux-color-windows'


################################
# Plugins (TPM)                #
################################

# auto-install TPM on a fresh machine so dotfiles "just work" across machines
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'zsh -lc \"git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins\"'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# auto-save every 15 min and restore on tmux start (after reboot)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'


################################
# Local overrides              #
################################

source-file -q ~/.tmux.conf.local

# initialize TPM (must remain the last line)
run '~/.tmux/plugins/tpm/tpm'
